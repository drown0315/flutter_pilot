name: Real mcp_flutter Smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Real Finder smoke
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Flutter Pilot dependencies
        run: dart pub get

      - name: Install smoke app dependencies
        working-directory: examples/smoke_app
        run: flutter pub get

      - name: Install flutter-mcp-toolkit
        run: curl -fsSL https://raw.githubusercontent.com/Arenukvern/mcp_flutter/main/install.sh | bash

      - name: Check flutter-mcp-toolkit
        run: |
          command -v flutter-mcp-toolkit
          flutter-mcp-toolkit --help

      - name: Start smoke app
        id: smoke_app
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .runs/ci
          (
            cd examples/smoke_app
            flutter run \
              --machine \
              -d macos \
              --debug \
              --pid-file ../../.runs/ci/smoke_app.pid \
              > ../../.runs/ci/flutter_run_machine.log \
              2> ../../.runs/ci/flutter_run_stderr.log
          ) &

          dart run tool/extract_flutter_machine_ws_uri.dart \
            .runs/ci/flutter_run_machine.log \
            --timeout-seconds 90 \
            >> "$GITHUB_OUTPUT" || {
              echo "::group::flutter run --machine output"
              cat .runs/ci/flutter_run_machine.log || true
              echo "::endgroup::"
              echo "::group::flutter run stderr"
              cat .runs/ci/flutter_run_stderr.log || true
              echo "::endgroup::"
              exit 1
            }

      - name: Run real smoke verifier
        run: dart run tool/run_mcp_flutter_smoke.dart "${{ steps.smoke_app.outputs.vm_service_uri }}"

      - name: Stop smoke app
        if: always()
        shell: bash
        run: |
          if [ -f .runs/ci/smoke_app.pid ]; then
            kill "$(cat .runs/ci/smoke_app.pid)" || true
          fi

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: real-mcp-flutter-smoke-runs
          path: |
            .runs
