scenario:
  name: smoke_runtime
  description: |
    Exercises Flutter Pilot against the sample Flutter app through mcp_flutter.

steps:
  - label: enter_email
    type:
      byType: textField
      text: smoke@example.com

  - label: submit_form
    tap:
      byText: Submit smoke
      byType: button

  - label: wait_for_error
    waitFor:
      byText: Smoke validation failed
      timeoutMs: 5000


  - label: capture_runtime
    capture:
      screenshot: true
      snapshot: true
      logs: true
