scenario:
  name: smoke_runtime
  description: |
    Exercises Flutter Pilot against the sample Flutter app through pilot_runtime.

steps:
  - label: wait_for_smoke_form
    waitFor:
      byText: Smoke form
      timeoutMs: 5000

  - label: enter_email
    type:
      byType: textField
      text: smoke@example.com

  - label: submit_form
    tap:
      byText: Submit smoke
      byType: button

  - label: wait_for_error
    waitFor:
      byText: Smoke validation failed
      timeoutMs: 5000

  - label: capture_error
    capture: {}
