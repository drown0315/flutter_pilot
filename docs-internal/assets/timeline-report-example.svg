<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Flutter Pilot HTML timeline report example</title>
  <desc id="desc">A sample timeline report showing a passed smoke_runtime run, step statuses, durations, and captured artifacts.</desc>
